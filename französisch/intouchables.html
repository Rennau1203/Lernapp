  }
];
      let html = '<div class="sec-label">Quiz — Beantworte die Fragen auf Französisch</div><div class="quiz-wrap">';
      window._quizData.forEach((q, qi) => {

.translate-btn{display:inline-flex;align-items:center;gap:5px;margin-top:10px;padding:5px 12px;background:var(--surface);border:1px solid var(--border);border-radius:7px;color:var(--muted);font-family:'Syne',sans-serif;font-size:11px;font-weight:600;cursor:pointer;transition:background .18s,color .18s}
.translate-btn:hover{background:var(--surface2);color:var(--text)}
.quiz-translation{display:none;margin-top:8px;padding:8px 12px;background:color-mix(in srgb,var(--accent) 6%,transparent);border:1px solid color-mix(in srgb,var(--accent) 20%,transparent);border-radius:8px;font-size:12px;color:var(--muted);font-weight:400;font-style:italic}
.quiz-antworten{padding:12px 16px;display:flex;flex-direction:column;gap:6px}
.quiz-btn{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:9px 14px;text-align:left;font-family:'Syne',sans-serif;font-size:12.5px;color:var(--text);cursor:pointer;transition:background .18s,border-color .18s;line-height:1.5}
.quiz-btn:hover:not(.locked){background:var(--surface);border-color:var(--accent)}

@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:580px){.formel-inhalt{font-size:11px}.tab-btn{padding:7px 11px;font-size:11px}}
</style>
</head>

<script>
document.title = THEMA.titel + ' — ' + FACH.name + ' — Lernapp';
document.getElementById('nav-fach-name').textContent = FACH.name + ' · ' + THEMA.titel;
document.getElementById('back-label').textContent = FACH.name;
document.getElementById('hero-icon').textContent = THEMA.emoji;
document.getElementById('hero-title').innerHTML = '<i>' + THEMA.titel + '</i>';
document.getElementById('thema-desc').textContent = BESCHREIBUNG;

const tabBar    = document.getElementById('tab-bar');
const tabPanels = document.getElementById('tab-panels');

TABS.forEach((tab, i) => {
  var btn = document.createElement('button');
  btn.className = 'tab-btn' + (i === 0 ? ' active' : '');
  btn.textContent = tab.label;
  btn.setAttribute('data-tab', tab.id);
  btn.onclick = function() { switchTab(tab.id); };
  tabBar.appendChild(btn);

  var panel = document.createElement('div');
  panel.className = 'tab-panel' + (i === 0 ? ' active' : '');
  panel.id = 'panel-' + tab.id;
  tabPanels.appendChild(panel);

  if (i === 0) tab.render(panel);
});

function switchTab(id) {
  document.querySelectorAll('.tab-btn').forEach(function(b) {
    b.classList.toggle('active', b.getAttribute('data-tab') === id);
  });
  document.querySelectorAll('.tab-panel').forEach(function(p) {
    var active = p.id === 'panel-' + id;
    p.classList.toggle('active', active);
    if (active && p.innerHTML.trim() === '') {
      var tab = TABS.find(function(t) { return t.id === id; });
      if (tab) tab.render(p);
    }
  });
}

function antworten(qi, ai) {
  var card = document.getElementById('qc' + qi);
  if (!card || card.classList.contains('beantwortet')) return;
  card.classList.add('beantwortet');
  var quiz = window._quizData;
  var richtigIdx = quiz[qi].richtig;
  for (var i = 0; i < quiz[qi].antworten.length; i++) {
    var btn = document.getElementById('qb' + qi + '_' + i);
    if (!btn) continue;
    btn.classList.add('locked');
    if (i === richtigIdx) btn.classList.add('richtig');
    else if (i === ai && i !== richtigIdx) btn.classList.add('falsch');
  }
  var erkl = document.getElementById('qe' + qi);
  if (erkl) erkl.style.display = 'block';
}

function toggleTranslate(qi) {
  var trans = document.getElementById('qtrans' + qi);
  var btn   = document.getElementById('tbtn' + qi);
  if (!trans || !btn) return;
  var visible = trans.style.display === 'block';
  var q = window._quizData[qi];

  // Frage-Übersetzung
  trans.style.display = visible ? 'none' : 'block';
  btn.textContent = visible ? '🇩🇪 Übersetzen' : '🇩🇪 Ausblenden';

  // Antworten umschalten
  for (var i = 0; i < q.antworten.length; i++) {
    var abtn = document.getElementById('qb' + qi + '_' + i);
    if (!abtn) continue;
    abtn.textContent = visible ? q.antworten[i] : q.antworten_de[i];
  }
}
</script>
