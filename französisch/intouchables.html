<!DOCTYPE html>
<html lang="de" data-mode="dark" data-theme="dunkel">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script>
const FACH = { name: "Französisch", icon: "🇫🇷" };

const THEMA = {
  titel:        "Intouchables",
  emoji:        "🎬",
  beschreibung: "\"Intouchables\" (2011) von Olivier Nakache & Éric Toledano — Ein reicher, querschnittsgelähmter Pariser Aristokrat (Philippe) stellt den arbeitslosen Banlieue-Bewohner Driss als Pflegekraft ein, und die beiden entwickeln trotz völlig verschiedener Welten eine tiefe Freundschaft.",

  kernpunkte: [
    {
      titel: "Was kommt in der Klausur?",
      text:  "Aufgabe 1: Analyse einer Filmszene mit Bild (beschreiben, Bezug zum Film/Text herstellen, Botschaft erklären). Aufgabe 2: Multiple-Choice und offene Fragen zum Film/zur Szene. Aufgabe 3: Journal intime, lettre personnelle ODER monologue intérieur — immer aus der Perspektive von Driss oder Philippe."
    },
    {
      titel: "Die zwei Hauptfiguren",
      text:  "Philippe: reich, querschnittsgelähmt (tétraplégique), Kunstliebhaber, romantisch, gebildet, witzig — aber abhängig von Hilfe. Driss: arbeitslos, aus der Banlieue, vorbestraft, direkt, musikalisch (Soul/Funk), humorvoll, loyal — entwickelt sich durch Philippe weiter."
    },
    {
      titel: "Das Hauptthema",
      text:  "Zwei Welten (pauvre ↔ riche, banlieue ↔ hôtel particulier) treffen aufeinander. Beide verändern sich gegenseitig — Driss befreit Philippe von seiner Isolation, Philippe gibt Driss eine Chance im Leben. Zentral: Freundschaft über soziale Grenzen hinweg."
    }
  ],

  blocks: [
    // ── AUFGABE 1: BILDANALYSE ──────────────────────────────
    {
      typ:    "formel",
      titel:  "Aufgabe 1 — Bildanalyse (analyse d'une image/scène): Aufbau",
      inhalt: `SCHRITT 1 — BESCHREIBEN (Description)\n  Was sehe ich? Wo? Wer ist zu sehen?\n  → Im Vordergrund (au premier plan) / Im Hintergrund (à l'arrière-plan)\n  → Links (à gauche) / Rechts (à droite) / In der Mitte (au milieu)\n  → On voit... / On peut voir... / Il y a...\n\nSCHRITT 2 — BEZUG ZUM FILM (Rapport texte/film)\n  Was zeigt diese Szene im Kontext des Films?\n  → Cette scène montre... / Dans cette scène, ...\n  → Cela se passe au moment où...\n  → On reconnaît Philippe / Driss parce que...\n\nSCHRITT 3 — BOTSCHAFT (Message / Interprétation)\n  Was will der Regisseur damit sagen?\n  → Le message de cette image est...\n  → Selon moi, la toile/photo exprime...\n  → On voit que la relation entre Driss et Philippe est...`
    },
    {
      typ:    "beispiel",
      titel:  "Satzhilfen für die Bildanalyse (fertige Sätze zum Einsetzen)",
      inhalt: `BESCHREIBEN:\n  „Sur cette image, on voit [Person] qui [Verb]..."\n  „À gauche/droite, il y a..."\n  „Au premier plan, on remarque..."\n  „L'image montre une scène où..."\n\nBEZUG ZUM FILM:\n  „Cette scène se passe [wann/wo im Film]..."\n  „On reconnaît Driss/Philippe, parce qu'il..."\n  „Dans cette scène, Driss et Philippe..."\n  „C'est le moment où Philippe décide de..."\n\nBOTSCHAFT:\n  „Le message est que la vraie amitié n'a pas de frontières."\n  „Cette image montre que les deux hommes se comprennent malgré leurs différences."\n  „À mon avis, la toile/photo représente [Freiheit / Freundschaft / Vertrauen]."\n  „Selon moi, on voit l'infini / l'espoir / la liberté."`
    },

    // ── AUFGABE 2: FILMWISSEN ───────────────────────────────
    {
      typ:    "hinweis",
      titel:  "Wichtige Fakten zum Film — für Multiple Choice & offene Fragen",
      inhalt: `PHILIPPE:\n  • Querschnittsgelähmt nach Paragliding-Unfall\n  • Lebt in einem großen Hôtel particulier in Paris\n  • Sammelt Kunst (peinture, poésie, musique classique)\n  • Seine Frau Alice ist an Krebs gestorben → sein „wahres Handicap"\n  • Brieffreundschaft mit Éléonore\n  • Adoptivtochter Elisa (15 J.) — hat keinen guten Draht zu ihr\n  • Nach 5 toten Babys adoptierte er ein Kind\n  • Liebt Paragliding wegen Risiko, Geschwindigkeit, dem Gefühl von oben\n\nDRISS:\n  • Echter Name: Bakari Bassara, aus dem Senegal, mit 8 Jahren adoptiert\n  • 6 Monate Gefängnis wegen Juwelendiebstahl\n  • Will zuerst nur die Assedic-Unterschrift (Arbeitslosengeld)\n  • Familie lebt in einer kleinen HLM-Wohnung in der Banlieue\n  • Kleiner Bruder Adama → Drogenhandel\n  • Liebt Soul- und Funk-Musik\n  • Am Ende: bekommt Job, Führerschein, findet sich selbst\n\nCAFÉ-SZENE „Aux Deux Magots" (43:02–46:43) — wichtig!\n  • Philippe erzählt Driss von seinem Leben, Alice, dem Paragliding\n  • Driss wird offiziell fest eingestellt\n  • Themen: Liebe, Paragliding, Elternschaft, Handicap`
    },

    // ── AUFGABE 3: SCHREIBAUFGABEN ──────────────────────────
    {
      typ:    "formel",
      titel:  "Aufgabe 3a — Journal intime: Aufbau & Pflichtbestandteile",
      inhalt: `FORMAT:\n  Datum + Uhrzeit oben (z.B.: „Paris, le 15 novembre, 23 h 30")\n  Anrede optional: „Cher journal," oder direkt anfangen\n\nINHALT (was rein muss):\n  1. Was ist gerade passiert? (die Situation erklären)\n  2. Wie fühle ich mich? (Gefühle ausdrücken)\n  3. Warum hat jemand so gehandelt? (Gründe suchen)\n  4. Was könnte als nächstes passieren?\n  5. Optional: Eine Entscheidung treffen\n\nSPRACHE:\n  → Ich-Perspektive (je / moi)\n  → Umgangssprache erlaubt: „C'est pas vrai !", „Bof..."\n  → Zeiten: présent, imparfait, passé composé\n  → Ausrufe nutzen: „Quelle journée !", „Incroyable !"`
    },
    {
      typ:    "formel",
      titel:  "Aufgabe 3b — Lettre personnelle: Aufbau & Pflichtbestandteile",
      inhalt: `FORMAT:\n  Ort + Datum oben rechts: „Paris, le 15 novembre"\n  Anrede: „Cher Philippe," / „Cher Driss,"\n  Schluss:  „Je t'embrasse, / Amicalement," + Name\n\nINHALT:\n  1. Warum schreibe ich? (Anlass erklären)\n  2. Was ist passiert? (Situation beschreiben)\n  3. Wie geht es mir dabei? (Gefühle)\n  4. Was wünsche ich mir / erwarte ich?\n  5. Abschlusssatz + Grußformel\n\nSPRACHE:\n  → Persönlich, direkt, freundlich\n  → Zeiten: présent + passé composé + futur für Pläne\n  → Ausdrücke: „Je t'écris pour...", „Je voulais te dire que...", „J'espère que..."`
    },
    {
      typ:    "formel",
      titel:  "Aufgabe 3c — Monologue intérieur: Aufbau & Pflichtbestandteile",
      inhalt: `WAS IST EIN MONOLOGUE INTÉRIEUR?\n  Die inneren Gedanken einer Person in einem bestimmten Moment.\n  Sehr ähnlich wie ein Tagebuch, aber noch spontaner und ungeordneter.\n\nINHALT:\n  1. Was passiert gerade? / Was hat jemand gesagt?\n  2. Warum hat er/sie so gehandelt? (Erklärungen suchen)\n  3. Innere Konflikte, Zweifel, Hoffnungen\n  4. Was werde ich tun?\n\nSPRACHE:\n  → Ich-Perspektive (je)\n  → Keine feste Reihenfolge der Gedanken nötig\n  → Viele Fragen: „Pourquoi est-ce qu'il...?", „Que faire ?\"\n  → Ausrufe: „Je n'en reviens pas !", „C'est incroyable !"\n  → Zeiten: présent, imparfait, passé composé, futur`
    },

    // ── SATZHILFEN GEFÜHLE & AUSDRÜCKE ─────────────────────
    {
      typ:    "beispiel",
      titel:  "Satzhilfen: Gefühle ausdrücken (für alle 3 Schreibaufgaben)",
      inhalt: `POSITIVE GEFÜHLE:\n  „Je suis content(e) / heureux(-se) que + subj."\n  „Je me sens bien / à l'aise avec lui."\n  „Je suis soulagé(e)..."\n  „Je n'en reviens pas — c'est incroyable !"\n  „Quelle chance ! / Quelle surprise !"\n\nNEGATIVE GEFÜHLE:\n  „Je suis en colère / furieux(-se)."\n  „Je me sens seul(e) / abandonné(e) / déçu(e)."\n  „J'ai honte de... / J'ai peur de..."\n  „Je ne comprends pas pourquoi il/elle..."\n  „Ça m'énerve ! / J'en ai marre !"\n\nZWEIFEL / FRAGEN:\n  „Je me demande si / pourquoi..."\n  „Peut-être que... / Il est possible que + subj."\n  „Comment réagir ? / Que faire ?"\n\nWÜNSCHE / ENTSCHEIDUNGEN:\n  „Je voudrais que + subj. / J'aimerais que + subj."\n  „Il faut que je... / Je dois..."\n  „Finalement, je vais... / À partir de maintenant,..."`
    },

    // ── VOKABULAR FÜR DRISS-TEXTE ──────────────────────────
    {
      typ:    "beispiel",
      titel:  "Driss schreibt / denkt — konkrete Beispielsätze",
      inhalt: `DRISS schreibt an Philippe / denkt über Philippe nach:\n\n  „Philippe m'a donné une chance que personne n'avait donnée avant."\n  „Je ne comprends pas vraiment son monde, mais je le respecte."\n  „Au début, je voulais juste partir. Mais maintenant..."\n  „Il me traite comme une personne normale, pas comme un employé."\n  „Chez lui, j'ai découvert la musique classique / la peinture."\n  „Je dois aider mon frère Adama. C'est ma famille."\n  „Sans Philippe, je serais encore dans la rue."\n  „Cette amitié est étrange, mais elle est réelle."\n\nEINFACHE ÜBERGÄNGE:\n  D'abord... → Ensuite... → Enfin...\n  Au début... → Mais maintenant...\n  Aujourd'hui... / Ce soir... / Cette nuit...`
    },
    {
      typ:    "beispiel",
      titel:  "Philippe schreibt / denkt — konkrete Beispielsätze",
      inhalt: `PHILIPPE schreibt an Driss / denkt über Driss nach:\n\n  „Driss n'est pas comme les autres. Il me parle normalement."\n  „Il ne me voit pas d'abord comme un handicapé."\n  „Grâce à lui, j'ai retrouvé le goût de vivre."\n  „Il m'a fait rire comme je n'avais pas ri depuis longtemps."\n  „Je lui fais confiance, même si mon entourage ne comprend pas."\n  „Mon vrai handicap, ce n'est pas le fauteuil. C'est la solitude."\n  „Alice me manque toujours. Mais Driss m'aide à continuer."\n  „Je voulais lui donner une chance — il me l'a rendue au centuple."\n\nBRIEF-ANFÄNGE FÜR PHILIPPE:\n  „Cher Driss, je t'écris pour te dire que..."\n  „Depuis ton départ, la maison est différente..."\n  „Je voulais te remercier pour tout ce que tu as fait..."`
    },

    // ── VOKABELLISTE KLAUSURRELEVANT ────────────────────────
    {
      typ:    "hinweis",
      titel:  "Klausurvokabular — die wichtigsten Wörter",
      inhalt: `PERSONEN & BEZIEHUNG:\n  l'amitié (f.) = die Freundschaft\n  un ami intime = ein enger Freund\n  la confiance = das Vertrauen\n  faire confiance à qn = jdm vertrauen\n  se confier à qn = sich jdm anvertrauen\n  s'aider mutuellement = sich gegenseitig helfen\n  la compassion = das Mitleid\n  la déception = die Enttäuschung\n\nFILM & SZENE (Bildanalyse):\n  l'image (f.) = das Bild\n  au premier plan = im Vordergrund\n  à l'arrière-plan = im Hintergrund\n  à gauche / à droite = links / rechts\n  au milieu / au centre = in der Mitte\n  le message = die Botschaft\n  le réalisateur = der Regisseur\n\nSOZIALE LAGE:\n  être au chômage = arbeitslos sein\n  la banlieue = der Vorort (oft sozial schwach)\n  un hôtel particulier = ein Stadtpalais\n  un handicapé / tétraplégique = ein Querschnittsgelähmter\n  un fauteuil roulant = ein Rollstuhl\n  aisé(e) = wohlhabend\n  marginalisé(e) = ausgegrenzt`
    },

    // ── GRAMMATIKHINWEISE ───────────────────────────────────
    {
      typ:    "hinweis",
      titel:  "Grammatik-Schnellcheck für die Schreibaufgaben",
      inhalt: `SUBJONCTIF — nach diesen Ausdrücken nötig:\n  „Je veux / voudrais que + subj."\n  „Il faut que + subj."\n  „Je suis content(e) que + subj."\n  „Il est possible que + subj."\n  Bildung: ils-Form Präsens, -ent weg, + -e, -es, -e, -ions, -iez, -ent\n  Beispiel: finir → ils finissent → je finisse\n\nPROPOSITION CONDITIONNELLE (wenn...dann):\n  Vergangenheit (hätte getan): „Si j'avais su, j'aurais fait..."\n  Gegenwart (würde tun): „Si je pouvais, je ferais..."\n\nZEITEN IM ÜBERBLICK:\n  Présent: Was gerade passiert / Gefühle jetzt\n  Passé composé: Was passiert ist (j'ai fait, il est venu)\n  Imparfait: Zustand in der Vergangenheit (c'était, il était)\n  Futur simple: Was passieren wird (je ferai, il viendra)`
    }
  ]
};

// ── QUIZ-DATEN ───────────────────────────────────────────
const QUIZ = [
  {
    frage: "Warum geht Driss anfangs überhaupt zum Vorstellungsgespräch bei Philippe?",
    antworten: [
      "Er will unbedingt als Pflegekraft arbeiten.",
      "Er braucht nur die Unterschrift für sein Arbeitslosengeld (Assedic).",
      "Er wurde von einem Freund geschickt.",
      "Er kennt Philippe bereits."
    ],
    richtig: 1,
    erklaerung: "Driss will die Unterschrift (la signature) für seine Assedic — das Arbeitslosengeld. Er hat kein echtes Interesse an dem Job."
  },
  {
    frage: "Was ist laut Philippe sein „wahres Handicap"?",
    antworten: [
      "Der Rollstuhl.",
      "Seine Tochter Elisa.",
      "Der Tod seiner Frau Alice.",
      "Die Schmerzen in den Beinen."
    ],
    richtig: 2,
    erklaerung: "Philippe sagt: \"Mon vrai handicap, ce n'est pas le fauteuil, mais d'avoir perdu ma femme.\" Die Einsamkeit nach Alices Tod ist sein eigentliches Leiden."
  },
  {
    frage: "Wie heißt Driss mit richtigem Namen?",
    antworten: [
      "Adama Bassara",
      "Bakari Bassara",
      "Driss Sellou",
      "Omar Sy"
    ],
    richtig: 1,
    erklaerung: "Driss heißt eigentlich Bakari Bassara. Er kam aus dem Senegal und wurde mit 8 Jahren von seinem Onkel adoptiert und in Driss umbenannt."
  },
  {
    frage: "Was passiert in der Café-Szene „Aux Deux Magots" (43:02–46:43)?",
    antworten: [
      "Driss kündigt seinen Job.",
      "Philippe und Driss streiten sich.",
      "Philippe stellt Driss fest ein und erzählt ihm von seinem Leben.",
      "Driss lernt Éléonore kennen."
    ],
    richtig: 2,
    erklaerung: "In dieser wichtigen Szene (embauché = fest eingestellt) erzählt Philippe von Alice, dem Paragliding, seinem Leben — sie lernen sich wirklich kennen."
  },
  {
    frage: "Welche Zeitformen braucht man im Journal intime?",
    antworten: [
      "Nur Futur",
      "Nur Imparfait",
      "Présent, Imparfait und Passé composé",
      "Nur Passé composé"
    ],
    richtig: 2,
    erklaerung: "Im Tagebuch nutzt man: présent (Gefühle jetzt), passé composé (was passiert ist), imparfait (Zustände in der Vergangenheit). Alle drei zusammen!"
  },
  {
    frage: "Nach welchem Ausdruck muss man den Subjonctif verwenden?",
    antworten: [
      "„Je pense que..."",
      "„Il dit que..."",
      "„Je veux que..."",
      "„Je sais que...""
    ],
    richtig: 2,
    erklaerung: "Nach Willensausdrücken wie „je veux que", „il faut que", „je voudrais que" kommt immer der Subjonctif. Nach „je pense que", „il dit que", „je sais que" kommt der Indikativ."
  },
  {
    frage: "Wo leben die Hauptfiguren zu Beginn des Films?",
    antworten: [
      "Beide in der Banlieue",
      "Philippe im Hôtel particulier, Driss in der Banlieue (HLM)",
      "Beide in einem Luxushotel",
      "Driss im Hôtel particulier, Philippe in der Banlieue"
    ],
    richtig: 1,
    erklaerung: "Philippe wohnt in einem großen Stadtpalais (hôtel particulier), Driss in einer kleinen HLM-Wohnung in der Banlieue parisienne — das ist der Kern des sozialen Kontrasts."
  },
  {
    frage: "Welcher Satz ist ein guter Einstieg für einen Monologue intérieur von Driss?",
    antworten: [
      "„Cher journal, aujourd'hui..."",
      "„Paris, le 15 novembre — Cher Philippe..."",
      "„Je n'en reviens pas ! Philippe vient de me dire que..."",
      "„Il était une fois dans la banlieue...""
    ],
    richtig: 2,
    erklaerung: "Der Monologue intérieur beginnt direkt mit einem Gedanken/Ausruf — ohne Datumszeile (das ist das Tagebuch) und ohne Anrede (das ist der Brief). Spontan, emotional, in der Ich-Perspektive."
  }
];
</script>

<style>
header{padding:88px 0 0;position:relative;z-index:1}
.thema-desc{font-size:15px;color:var(--muted);max-width:680px;line-height:1.8;margin-top:10px;transition:color .3s}
.content-area{display:flex;flex-direction:column;gap:48px;padding-bottom:80px;position:relative;z-index:1}

/* Kernpunkte */
.kernpunkt-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1px;background:var(--border);border:1px solid var(--border);border-radius:14px;overflow:hidden;transition:background .3s,border-color .3s}
.kernpunkt{background:var(--surface);padding:22px 20px 20px;display:flex;flex-direction:column;gap:10px;transition:background .18s;animation:fadeUp .4s ease both}
.kernpunkt:hover{background:var(--surface2)}
.kp-num{font-size:10px;font-weight:700;letter-spacing:.18em;color:var(--accent);text-transform:uppercase;transition:color .3s}
.kp-titel{font-size:14px;font-weight:600;letter-spacing:-.01em}
.kp-text{font-size:13px;color:var(--muted);line-height:1.75;transition:color .3s}

/* Blocks */
.block-stack{display:flex;flex-direction:column;gap:12px}
.block{border:1px solid var(--border);border-radius:12px;overflow:hidden;transition:border-color .3s;animation:fadeUp .4s ease both}
.block-header{padding:12px 18px;background:var(--surface2);display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);transition:background .3s,border-color .3s}
.block-tag{font-size:9px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--accent-fg);background:var(--accent);padding:2px 7px;border-radius:5px;transition:background .3s,color .3s}
.block-tag.beispiel-tag{background:var(--surface);color:var(--muted);border:1px solid var(--border)}
.block-tag.hinweis-tag{background:transparent;color:var(--accent);border:1px solid var(--accent)}
.block-titel{font-size:13px;font-weight:600}
.block-body{padding:18px;background:var(--surface);transition:background .3s}
.formel-inhalt{font-family:'Courier New',monospace;font-size:12.5px;line-height:1.95;color:var(--text);white-space:pre;overflow-x:auto;transition:color .3s}
.beispiel-inhalt{font-family:'Syne',sans-serif;font-size:13px;line-height:1.9;color:var(--text);white-space:pre-line;transition:color .3s}
.block.hinweis-block{border-color:var(--accent)}
.block.hinweis-block .block-header{background:color-mix(in srgb,var(--accent) 8%,transparent);border-bottom-color:var(--accent)}
.hinweis-inhalt{font-size:13px;line-height:1.8;color:var(--muted);white-space:pre-line;transition:color .3s}

/* Quiz */
.quiz-wrap{display:flex;flex-direction:column;gap:20px}
.quiz-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;animation:fadeUp .4s ease both;transition:border-color .3s}
.quiz-frage{padding:16px 18px 14px;background:var(--surface2);border-bottom:1px solid var(--border);font-size:13px;font-weight:600;line-height:1.55;transition:background .3s,border-color .3s}
.quiz-frage span{font-size:10px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--accent);display:block;margin-bottom:6px;transition:color .3s}
.quiz-antworten{padding:14px 18px;display:flex;flex-direction:column;gap:7px}
.quiz-btn{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:9px 14px;text-align:left;font-family:'Syne',sans-serif;font-size:12.5px;color:var(--text);cursor:pointer;transition:background .18s,border-color .18s,color .18s;line-height:1.5}
.quiz-btn:hover:not(.locked){background:var(--surface);border-color:var(--accent)}
.quiz-btn.richtig{background:color-mix(in srgb,var(--accent) 15%,transparent);border-color:var(--accent);color:var(--text)}
.quiz-btn.falsch{background:color-mix(in srgb,#f55 10%,transparent);border-color:#f55;color:var(--muted)}
.quiz-erklaerung{margin:0 18px 14px;padding:10px 14px;background:color-mix(in srgb,var(--accent) 10%,transparent);border:1px solid color-mix(in srgb,var(--accent) 30%,transparent);border-radius:8px;font-size:12px;line-height:1.65;color:var(--text);display:none;transition:background .3s}

.kernpunkt:nth-child(1){animation-delay:.04s}.kernpunkt:nth-child(2){animation-delay:.08s}.kernpunkt:nth-child(3){animation-delay:.12s}
.block:nth-child(1){animation-delay:.04s}.block:nth-child(2){animation-delay:.08s}.block:nth-child(3){animation-delay:.12s}.block:nth-child(4){animation-delay:.16s}.block:nth-child(5){animation-delay:.20s}.block:nth-child(6){animation-delay:.24s}
.quiz-card:nth-child(1){animation-delay:.04s}.quiz-card:nth-child(2){animation-delay:.08s}.quiz-card:nth-child(3){animation-delay:.12s}.quiz-card:nth-child(4){animation-delay:.16s}.quiz-card:nth-child(5){animation-delay:.20s}

@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:580px){.kernpunkt-grid{grid-template-columns:1fr}.formel-inhalt{font-size:11px}}
</style>
</head>

<script src="../design.js"></script>
<script>
// Seite befüllen
document.title = THEMA.titel + ' — ' + FACH.name + ' — Lernapp';
document.getElementById('nav-fach-name').textContent = FACH.name + ' · ' + THEMA.titel;
document.getElementById('back-label').textContent = FACH.name;
document.getElementById('hero-icon').textContent = THEMA.emoji;
document.getElementById('hero-title').innerHTML = '<i>' + THEMA.titel + '</i>';
document.getElementById('thema-desc').textContent = THEMA.beschreibung;

// Kernpunkte rendern
const kGrid = document.getElementById('kernpunkt-grid');
THEMA.kernpunkte.forEach((kp, i) => {
  kGrid.innerHTML += `<div class="kernpunkt"><div class="kp-num">Punkt ${String(i+1).padStart(2,'0')}</div><div class="kp-titel">${kp.titel}</div><div class="kp-text">${kp.text}</div></div>`;
});

// Blocks rendern
const bStack = document.getElementById('block-stack');
THEMA.blocks.forEach(block => {
  let tagClass='', tagLabel='', inhaltHTML='';
  if (block.typ === 'formel') {
    tagClass = 'formel-tag'; tagLabel = 'Aufbau';
    inhaltHTML = `<div class="formel-inhalt">${block.inhalt}</div>`;
  } else if (block.typ === 'beispiel') {
    tagClass = 'beispiel-tag'; tagLabel = 'Satzhilfen';
    inhaltHTML = `<div class="beispiel-inhalt">${block.inhalt}</div>`;
  } else if (block.typ === 'hinweis') {
    tagClass = 'hinweis-tag'; tagLabel = 'Merke';
    inhaltHTML = `<div class="hinweis-inhalt">${block.inhalt}</div>`;
  }
  bStack.innerHTML += `<div class="block${block.typ==='hinweis'?' hinweis-block':''}"><div class="block-header"><span class="block-tag ${tagClass}">${tagLabel}</span><span class="block-titel">${block.titel}</span></div><div class="block-body">${inhaltHTML}</div></div>`;
});

// Quiz rendern
const qWrap = document.getElementById('quiz-wrap');
QUIZ.forEach((q, qi) => {
  const cardId = 'qc' + qi;
  let antwHTML = '';
  q.antworten.forEach((a, ai) => {
    antwHTML += `<button class="quiz-btn" id="qb${qi}_${ai}" onclick="antworten(${qi},${ai})">${a}</button>`;
  });
  qWrap.innerHTML += `
    <div class="quiz-card" id="${cardId}">
      <div class="quiz-frage"><span>Frage ${qi+1} von ${QUIZ.length}</span>${q.frage}</div>
      <div class="quiz-antworten">${antwHTML}</div>
      <div class="quiz-erklaerung" id="qe${qi}">✓ ${q.erklaerung}</div>
    </div>`;
});

function antworten(qi, ai) {
  const card = document.getElementById('qc' + qi);
  if (card.classList.contains('beantwortet')) return;
  card.classList.add('beantwortet');
  const richtigIdx = QUIZ[qi].richtig;
  for (let i = 0; i < QUIZ[qi].antworten.length; i++) {
    const btn = document.getElementById('qb' + qi + '_' + i);
    btn.classList.add('locked');
    if (i === richtigIdx) btn.classList.add('richtig');
    else if (i === ai && i !== richtigIdx) btn.classList.add('falsch');
  }
  const erkl = document.getElementById('qe' + qi);
  erkl.style.display = 'block';
}
</script>
