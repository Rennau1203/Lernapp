<div class="wrap">

    </div>

      <!-- wird per JS befüllt -->
    </div>

<footer>Lernapp · Alle Inhalte für den privaten Schulgebrauch</footer>

<script src="../../design.js"></script>
<script>
// Seite befüllen
document.title = 'Alle Themen — ' + FACH.name + ' — Lernapp';
document.getElementById('nav-fach-name').textContent = FACH.name + ' · Alle Themen';
document.getElementById('back-label').textContent = FACH.name;
document.getElementById('hero-icon').textContent = FACH.icon;
document.getElementById('hero-title').innerHTML = '<i>Alle Themen</i>';

// Themen-Karten rendern
const grid = document.getElementById('themen-grid');
THEMEN.forEach((t, i) => {
  const isReady = t.status === 'ready';
  const delay = ((i + 1) * 0.04).toFixed(2);
  grid.innerHTML += `
    <a class="folder${isReady ? '' : ' disabled'}"
       href="${isReady ? t.datei : '#'}"
       style="animation-delay:${delay}s">
      <div class="f-top">
        <div class="f-icon">${t.emoji}</div>
        <div class="f-arrow">↗</div>
      </div>
      <div>
        <div class="f-name">${t.titel}</div>
        <div class="f-sub">${t.sub}</div>
      </div>
      <div class="f-badge ${t.status === 'ready' ? 'ready' : 'soon'}">
        ${t.status === 'ready' ? 'Verfügbar' : 'Bald verfügbar'}
      </div>
    </a>`;
});
</script>
